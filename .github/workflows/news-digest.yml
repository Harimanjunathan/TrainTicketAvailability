name: Daily News Digest

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00 AM IST (UTC+5:30 → 02:30 UTC)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch news for (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install requests python-dotenv

      - name: Send news digest
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL }}
        run: python news_digest.py ${{ github.event.inputs.date }}
